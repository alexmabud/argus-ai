<!-- Modal de foto ampliada com informações da pessoa -->
<div x-show="showPhotoModal" x-cloak @click="if($event.target === $el) closePhotoModal()"
     style="position: fixed; inset: 0; background: rgba(5, 10, 15, 0.9); z-index: 60; display: flex; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px);">

  <div @click.stop
       style="display: flex; flex-direction: column; max-width: min(90vw, 540px); width: 100%; max-height: 90vh; overflow-y: auto; border-radius: 8px; background: var(--color-surface); border: 1px solid var(--color-border); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);">

    <!-- Header com botão fechar -->
    <div style="display: flex; align-items: center; justify-content: space-between; padding: 1rem; border-bottom: 1px solid var(--color-border); flex-shrink: 0;">
      <h3 style="font-family: var(--font-data); font-size: 0.8rem; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 0;">Foto Ampliada</h3>
      <button @click="closePhotoModal()"
              style="background: none; border: none; cursor: pointer; color: var(--color-text-muted); font-size: 1.5rem; line-height: 1; padding: 0; width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center; transition: color 0.15s;"
              onmouseover="this.style.color='var(--color-text)'"
              onmouseout="this.style.color='var(--color-text-muted)'">
        ✕
      </button>
    </div>

    <!-- Conteúdo do modal -->
    <div style="display: flex; flex-direction: column; gap: 1rem; padding: 1rem; overflow-y: auto; flex: 1;">

      <!-- Loading -->
      <template x-if="photoModalLoading && !pessoa">
        <div style="display: flex; justify-content: center; align-items: center; padding: 2rem;">
          <span class="spinner"></span>
        </div>
      </template>

      <!-- Erro -->
      <template x-if="photoModalError && !photoModalLoading">
        <div style="padding: 1rem; background: var(--color-surface-hover); border-radius: 4px; border-left: 4px solid var(--color-danger);">
          <p style="color: var(--color-danger); margin: 0; font-size: 0.875rem;" x-text="photoModalError"></p>
        </div>
      </template>

      <!-- Foto ampliada -->
      <template x-if="photoUrl">
        <div style="display: flex; justify-content: center;">
          <img :src="photoUrl"
               style="width: 100%; max-height: 50vh; border-radius: 6px; object-fit: contain; display: block;">
        </div>
      </template>

      <!-- Informações da pessoa -->
      <template x-if="pessoa && !photoModalLoading">
        <div style="display: flex; flex-direction: column; gap: 0.75rem;">

          <!-- Nome (destaque) -->
          <div>
            <p style="font-family: var(--font-display); font-weight: 700; color: var(--color-text); text-transform: uppercase; margin: 0; font-size: 1.125rem;"
               x-text="pessoa.nome"></p>
            <template x-if="pessoa.apelido">
              <p style="font-size: 0.8rem; color: var(--color-secondary); font-family: var(--font-data); margin: 0.25rem 0 0 0; font-style: italic;"
                 x-text="'Vulgo: ' + pessoa.apelido"></p>
            </template>
          </div>

          <!-- Divisor -->
          <div style="height: 1px; background: var(--color-border);"></div>

          <!-- Dados pessoais -->
          <div style="display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.875rem;">

            <!-- CPF -->
            <template x-if="pessoa.cpf || pessoa.cpf_masked">
              <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="color: var(--color-text-dim); font-family: var(--font-data); font-weight: 500; text-transform: uppercase; font-size: 0.75rem;">CPF</span>
                <span style="color: var(--color-text-muted); font-family: var(--font-data); letter-spacing: 0.05em;" x-text="pessoa.cpf || pessoa.cpf_masked"></span>
              </div>
            </template>

            <!-- Data de nascimento -->
            <template x-if="pessoa.data_nascimento">
              <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="color: var(--color-text-dim); font-family: var(--font-data); font-weight: 500; text-transform: uppercase; font-size: 0.75rem;">Nascimento</span>
                <span style="color: var(--color-text-muted); font-family: var(--font-data);" x-text="formatarNascimento(pessoa.data_nascimento)"></span>
              </div>
            </template>

            <!-- Nome da mãe -->
            <template x-if="pessoa.nome_mae">
              <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="color: var(--color-text-dim); font-family: var(--font-data); font-weight: 500; text-transform: uppercase; font-size: 0.75rem;">Mãe</span>
                <span style="color: var(--color-text-muted); font-family: var(--font-data);" x-text="pessoa.nome_mae"></span>
              </div>
            </template>

            <!-- Endereço -->
            <template x-if="pessoa.enderecos && pessoa.enderecos.length > 0">
              <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                <span style="color: var(--color-text-dim); font-family: var(--font-data); font-weight: 500; text-transform: uppercase; font-size: 0.75rem;">Endereço</span>
                <span style="color: var(--color-text-muted); font-family: var(--font-data); word-break: break-word;" x-text="formatEndereco(pessoa.enderecos[0])"></span>
              </div>
            </template>

            <!-- Abordagens -->
            <template x-if="pessoa.abordagens_count !== undefined">
              <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="color: var(--color-text-dim); font-family: var(--font-data); font-weight: 500; text-transform: uppercase; font-size: 0.75rem;">Abordagens</span>
                <span style="background: var(--color-primary); color: var(--color-bg); padding: 0.25rem 0.5rem; border-radius: 4px; font-family: var(--font-data); font-size: 0.75rem; font-weight: 600;" x-text="pessoa.abordagens_count"></span>
              </div>
            </template>

            <!-- Observações -->
            <template x-if="pessoa.observacoes">
              <div style="display: flex; flex-direction: column; gap: 0.25rem; padding-top: 0.5rem;">
                <span style="color: var(--color-text-dim); font-family: var(--font-data); font-weight: 500; text-transform: uppercase; font-size: 0.75rem;">Observações</span>
                <p style="color: var(--color-text-muted); font-family: var(--font-data); margin: 0; font-size: 0.8rem; line-height: 1.4; word-break: break-word;" x-text="pessoa.observacoes"></p>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>

    <!-- Footer com botões -->
    <div style="display: flex; gap: 0.5rem; padding: 1rem; border-top: 1px solid var(--color-border); background: var(--color-surface-hover); border-radius: 0 0 8px 8px; flex-shrink: 0;">
      <button @click="closePhotoModal()"
              style="flex: 1; padding: 0.75rem; border-radius: 4px; background: var(--color-surface); color: var(--color-text-muted); border: 1px solid var(--color-border); font-family: var(--font-data); font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em;"
              onmouseover="this.style.background='var(--color-surface-active)'"
              onmouseout="this.style.background='var(--color-surface)'">
        Fechar
      </button>
      <button @click="goToFichaPessoa()"
              :disabled="!pessoa || photoModalLoading"
              style="flex: 1; padding: 0.75rem; border-radius: 4px; background: var(--color-primary); color: var(--color-bg); border: none; font-family: var(--font-data); font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em;"
              onmouseover="this.style.background='var(--color-primary-hover)'"
              onmouseout="this.style.background='var(--color-primary)'"
              :style="(!pessoa || photoModalLoading) ? 'opacity: 0.5; cursor: not-allowed;' : ''">
        Ver Ficha Completa
      </button>
    </div>
  </div>
</div>
