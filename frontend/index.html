<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050A0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Argus AI</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css?v=9">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      corePlugins: {
        preflight: false,
      },
      theme: {
        extend: {
          colors: {
            argus: {
              bg:      '#050A0F',
              surface: '#0D1520',
              hover:   '#1A2940',
              border:  '#1A2940',
              cyan:    '#00D4FF',
              green:   '#00FF88',
              orange:  '#FF6B00',
              text:    '#E8F4FF',
              muted:   '#6B8FA8',
              dim:     '#3A5068',
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script>
    // Forcar atualizacao do Service Worker e limpar caches antigos
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      caches.keys().then(function(keys) {
        keys.forEach(function(k) { caches.delete(k); });
      });
    }
  </script>
</head>
<body class="dark" x-data="app()" x-init="init()" :class="{ 'login-active': !authenticated }">

  <!-- Argus Eye — Background (login only) -->
  <img id="argus-eye-bg"
       src="/images/argus-eye.webp"
       x-show="!authenticated || currentPage === 'home'"
       alt=""
       aria-hidden="true">

  <!-- Offline indicator -->
  <div x-show="!online" class="offline-badge" x-cloak>
    <span class="status-dot status-dot-offline" style="margin-right:4px"></span>
    OFFLINE
  </div>

  <!-- Auth: Login -->
  <div id="page-login" x-show="!authenticated" x-cloak></div>

  <!-- App: Authenticated -->
  <div x-show="authenticated" x-cloak>

    <!-- Header -->
    <header class="app-header">
      <!-- Botão Voltar (só fora da home) -->
      <button class="header-back-btn"
              x-show="currentPage !== 'home'"
              x-cloak
              @click="navigate('home')"
              title="Voltar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>

      <!-- Logo -->
      <span class="header-logo" @click="navigate('home')">ARGUS</span>

      <!-- Search bar -->
      <div class="header-search" x-data="{ searchQuery: '' }">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text"
               x-model="searchQuery"
               placeholder="CONSULTAR BASE OPERACIONAL..."
               @keydown.enter.prevent="if(searchQuery.trim()) { navigate('consulta'); }">
      </div>

      <!-- Spacer -->
      <div style="flex:1"></div>

      <!-- LEDs de status -->
      <div class="header-status-leds">
        <div class="header-status-led">
          <span class="status-dot" :class="online ? 'status-dot-online' : 'status-dot-offline'"></span>
          <span>API</span>
        </div>
        <div class="header-status-led">
          <span class="status-dot status-dot-online"></span>
          <span>IA</span>
        </div>
        <div class="header-status-led">
          <span class="status-dot status-dot-sync"></span>
          <span>DB</span>
        </div>
      </div>

      <!-- Avatar do usuário -->
      <div class="header-user-avatar" @click="navigate('perfil')" title="Perfil">
        <template x-if="user?.foto_url">
          <img :src="user.foto_url" :alt="user.nome" />
        </template>
        <template x-if="!user?.foto_url">
          <span x-text="user?.nome ? user.nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase() : '?'"></span>
        </template>
      </div>
    </header>

    <!-- Main content -->
    <main class="app-main" :class="{ 'has-bottom-nav': currentPage !== 'home' }">
      <div id="page-content"></div>
    </main>

    <!-- Bottom Navigation (só fora da home) -->
    <nav class="bottom-nav" aria-label="Navegação principal" x-show="currentPage !== 'home'" x-cloak>
      <button type="button" aria-label="Navegar para Abordagem" class="bottom-nav-btn" :class="{ active: currentPage === 'abordagem-nova' }" @click="navigate('abordagem-nova')">
        <div class="nav-pill">
          <div class="nav-indicator"></div>
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
          <span class="bottom-nav-label">Abordagem</span>
        </div>
      </button>

      <button type="button" aria-label="Navegar para Consulta IA" class="bottom-nav-btn" :class="{ active: currentPage === 'consulta' }" @click="navigate('consulta')">
        <div class="nav-pill">
          <div class="nav-indicator"></div>
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span class="bottom-nav-label">Consulta IA</span>
        </div>
      </button>

      <button type="button" aria-label="Navegar para Início" class="bottom-nav-btn" :class="{ active: currentPage === 'home' }" @click="navigate('home')">
        <div class="nav-pill">
          <div class="nav-indicator"></div>
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          <span class="bottom-nav-label">Início</span>
        </div>
      </button>

      <button type="button" aria-label="Navegar para Ocorrência" class="bottom-nav-btn" :class="{ active: currentPage === 'ocorrencia-upload' }" @click="navigate('ocorrencia-upload')">
        <div class="nav-pill">
          <div class="nav-indicator"></div>
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></svg>
          <span class="bottom-nav-label">Ocorrência</span>
        </div>
      </button>

      <button type="button" aria-label="Navegar para Analítico" class="bottom-nav-btn" :class="{ active: currentPage === 'dashboard' }" @click="navigate('dashboard')">
        <div class="nav-pill">
          <div class="nav-indicator"></div>
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
          <span class="bottom-nav-label">Analítico</span>
        </div>
      </button>
    </nav>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js?v=4"></script>
  <script src="/js/auth.js?v=4"></script>
  <script src="/js/db.js?v=4"></script>
  <script src="/js/sync.js?v=4"></script>
  <script src="/js/components/gps.js?v=4"></script>
  <script src="/js/components/camera.js?v=3"></script>
  <script src="/js/components/voice.js?v=3"></script>
  <script src="/js/components/autocomplete.js?v=3"></script>
  <script src="/js/components/ocr-placa.js?v=3"></script>
  <script src="/js/components/offline-indicator.js?v=3"></script>
  <script src="/js/components/sync-queue.js?v=3"></script>
  <script src="/js/pages/login.js?v=4"></script>
  <script src="/js/pages/abordagem-nova.js?v=9"></script>
  <script src="/js/pages/consulta.js?v=5"></script>
  <script src="/js/pages/pessoa-detalhe.js?v=8"></script>
  <script src="/js/pages/ocorrencia-upload.js?v=3"></script>
  <script src="/js/pages/dashboard.js?v=4"></script>
  <script src="/js/pages/admin-usuarios.js?v=3"></script>
  <script src="/js/pages/perfil.js?v=2"></script>
  <script src="/js/app.js?v=8"></script>
  <!-- Leaflet JS + plugins -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
</body>
</html>
