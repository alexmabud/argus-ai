<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050A0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Argus AI</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css?v=5">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            argus: {
              bg:      '#050A0F',
              surface: '#0D1520',
              hover:   '#1A2940',
              border:  '#1A2940',
              cyan:    '#00D4FF',
              green:   '#00FF88',
              orange:  '#FF6B00',
              text:    '#E8F4FF',
              muted:   '#6B8FA8',
              dim:     '#3A5068',
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script>
    // Forcar atualizacao do Service Worker e limpar caches antigos
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      caches.keys().then(function(keys) {
        keys.forEach(function(k) { caches.delete(k); });
      });
    }
  </script>
</head>
<body class="dark" x-data="app()" x-init="init()" :class="{ 'login-active': !authenticated }">

  <!-- Argus Eye — Background (login only) -->
  <img id="argus-eye-bg"
       src="/images/argus-eye.webp"
       x-show="!authenticated"
       alt=""
       aria-hidden="true">

  <!-- Offline indicator -->
  <div x-show="!online" class="offline-badge" x-cloak>
    <span class="status-dot status-dot-offline" style="margin-right:4px"></span>
    OFFLINE
  </div>

  <!-- Auth: Login -->
  <div id="page-login" x-show="!authenticated" x-cloak></div>

  <!-- App: Authenticated -->
  <div x-show="authenticated" x-cloak>

    <!-- Header -->
    <header class="app-header" x-data="{ searchQuery: '' }">
      <!-- Mobile hamburger -->
      <button class="hamburger-btn" @click="$dispatch('sidebar:toggle-mobile')">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>

      <!-- Logo -->
      <span class="header-logo" @click="$dispatch('navigate', 'home')">ARGUS</span>

      <!-- Desktop sidebar toggle -->
      <button class="sidebar-toggle" @click="$dispatch('sidebar:toggle')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>

      <!-- Search bar -->
      <div class="header-search">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text"
               x-model="searchQuery"
               placeholder="CONSULTAR BASE OPERACIONAL..."
               @keydown.enter.prevent="if(searchQuery.trim()) { $dispatch('navigate', 'consulta'); }">
      </div>

      <!-- Header info (desktop) -->
      <div class="header-info">
        <div class="header-info-item" x-show="user?.matricula">
          <span class="label">OP</span>
          <span class="value font-data" x-text="user?.matricula || ''"></span>
        </div>

        <div class="header-info-item" x-show="user?.guarnicao_nome">
          <span class="label">GU</span>
          <span class="value font-data" x-text="user?.guarnicao_nome || ''"></span>
        </div>

        <div class="header-clock font-data" x-data="clockWidget()" x-text="time"></div>

        <div class="flex items-center gap-2">
          <span class="status-dot" :class="online ? 'status-dot-online' : 'status-dot-offline'"></span>
          <span x-show="syncPending > 0" class="text-xs font-data" style="color: var(--color-primary);" x-text="syncPending + ' sync'"></span>
        </div>
      </div>
    </header>

    <!-- Sidebar -->
    <div x-data="sidebarComponent()"
         @sidebar:toggle.window="toggle()"
         @sidebar:toggle-mobile.window="mobileOpen ? closeMobile() : openMobile()">

      <!-- Mobile overlay -->
      <div class="sidebar-overlay"
           :class="{ 'active': mobileOpen }"
           @click="closeMobile()"></div>

      <!-- Sidebar panel -->
      <aside class="sidebar"
             :class="{ 'collapsed': collapsed, 'mobile-open': mobileOpen }">

        <!-- Navigation -->
        <nav class="sidebar-nav">
          <template x-for="item in items" :key="item.id">
            <a class="sidebar-item"
               :class="{ 'active': currentPage === item.page }"
               @click.prevent="navigateTo(item.page)"
               :title="item.label">
              <span x-html="getIcon(item.icon)"></span>
              <span class="sidebar-label" x-text="item.label"></span>
            </a>
          </template>

          <!-- Admin item (conditional) -->
          <template x-if="user?.tipo === 'admin'">
            <a class="sidebar-item"
               :class="{ 'active': currentPage === 'admin-usuarios' }"
               @click.prevent="navigateTo('admin-usuarios')"
               title="Admin">
              <span x-html="getIcon('admin')"></span>
              <span class="sidebar-label">Admin</span>
            </a>
          </template>
        </nav>

        <!-- Footer -->
        <div class="sidebar-footer">
          <!-- System status -->
          <div class="sidebar-status">
            <div class="sidebar-status-item">
              <span class="status-dot" :class="online ? 'status-dot-online' : 'status-dot-offline'"></span>
              <span>API</span>
            </div>
            <div class="sidebar-status-item">
              <span class="status-dot status-dot-online"></span>
              <span>IA</span>
            </div>
            <div class="sidebar-status-item">
              <span class="status-dot status-dot-sync"></span>
              <span>DB</span>
            </div>
          </div>

          <!-- User info -->
          <div class="sidebar-user" @click="navigateTo('perfil')" style="cursor:pointer">
            <div class="sidebar-user-avatar">
              <template x-if="user?.foto_url">
                <img :src="user.foto_url" />
              </template>
              <template x-if="!user?.foto_url">
                <span x-text="user?.nome ? user.nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase() : '?'"></span>
              </template>
            </div>
            <div class="sidebar-user-info">
              <div class="sidebar-user-name" x-text="user?.nome_guerra || user?.nome || 'Operador'"></div>
              <div class="sidebar-user-role" x-text="user?.posto_graduacao || user?.tipo || ''"></div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="app-main" :class="{ 'sidebar-collapsed': collapsed }">
        <div id="page-content"></div>
      </main>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js?v=4"></script>
  <script src="/js/auth.js?v=4"></script>
  <script src="/js/db.js?v=4"></script>
  <script src="/js/sync.js?v=4"></script>
  <script src="/js/components/gps.js?v=4"></script>
  <script src="/js/components/camera.js?v=3"></script>
  <script src="/js/components/voice.js?v=3"></script>
  <script src="/js/components/autocomplete.js?v=3"></script>
  <script src="/js/components/ocr-placa.js?v=3"></script>
  <script src="/js/components/offline-indicator.js?v=3"></script>
  <script src="/js/components/sync-queue.js?v=3"></script>
  <script src="/js/components/sidebar.js?v=4"></script>
  <script src="/js/pages/login.js?v=4"></script>
  <script src="/js/pages/abordagem-nova.js?v=6"></script>
  <script src="/js/pages/consulta.js?v=5"></script>
  <script src="/js/pages/pessoa-detalhe.js?v=5"></script>
  <script src="/js/pages/ocorrencia-upload.js?v=3"></script>
  <script src="/js/pages/dashboard.js?v=3"></script>
  <script src="/js/pages/admin-usuarios.js?v=3"></script>
  <script src="/js/pages/perfil.js?v=2"></script>
  <script src="/js/app.js?v=5"></script>
  <!-- Leaflet JS + plugins -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
</body>
</html>
