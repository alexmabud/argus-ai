# Docker Compose de produção — Oracle Cloud
# HTTPS automático via Caddy (Let's Encrypt)
# Uso: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    build:
      context: .
      dockerfile: docker/db.Dockerfile
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-argus}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-argus_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-argus} -d ${DB_NAME:-argus_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /mnt/banco/pgdata:/var/lib/postgresql/data
      - ./scripts/init_extensions.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - /mnt/banco/redis:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-argus}:${DB_PASSWORD}@db:5432/${DB_NAME:-argus_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: https://${DOMAIN:-arguseye.duckdns.org}/storage
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    command: python -m arq app.worker.WorkerSettings
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-argus}:${DB_PASSWORD}@db:5432/${DB_NAME:-argus_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: https://${DOMAIN:-arguseye.duckdns.org}/storage
    volumes:
      - insightface_models:/app/.insightface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY obrigatório em produção}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY obrigatório em produção}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - /mnt/fotos:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/argus &&
      mc anonymous set public local/argus &&
      echo 'Bucket argus pronto.'
      "

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
  insightface_models:
