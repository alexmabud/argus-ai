global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: argus-ai
    environment: production

scrape_configs:
  # Prometheus em si
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # VM: CPU, RAM, Disco, Rede
  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]

  # Containers Docker: CPU/RAM por container
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metric_relabel_configs:
      # Manter apenas containers argus-*
      - source_labels: [name]
        regex: argus-.*
        action: keep

  # FastAPI: requests, latência, erros por endpoint
  - job_name: argus-api
    static_configs:
      - targets: [api:8000]
    metrics_path: /metrics

  # PostgreSQL: conexões, queries, cache hit rate
  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  # Redis: memória, hit/miss rate
  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
