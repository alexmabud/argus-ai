global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: argus-ai
    environment: production

scrape_configs:
  # Prometheus em si
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # VM: CPU, RAM, Disco, Rede
  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]

  # cAdvisor desativado em 2026-05-26 (Task 23) — incompatibilidade Docker 29.x
  # (storage driver overlayfs) deixava metricas sem labels uteis. Re-habilitar
  # junto com o servico em docker-compose.monitoring.yml se voltar a ser necessario.

  # FastAPI: requests, latência, erros por endpoint
  - job_name: argus-api
    static_configs:
      - targets: [api:8000]
    metrics_path: /metrics

  # PostgreSQL: conexões, queries, cache hit rate
  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  # Redis: memória, hit/miss rate
  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]

  # Grafana: métricas internas (alerting state, evaluations, etc)
  - job_name: grafana
    static_configs:
      - targets: [grafana:3000]
    metrics_path: /metrics

  # MinIO: sonda HTTP do health endpoint via blackbox
  - job_name: blackbox-minio
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://minio:9000/minio/health/live"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # HTTPS público: sonda SSL/TLS do domínio externo (cert expiry)
  - job_name: blackbox-https
    metrics_path: /probe
    params:
      module: [http_2xx_tls]
    static_configs:
      - targets: ["https://arguseye.duckdns.org/health"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
