apiVersion: 1
contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram-argus
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: ${TELEGRAM_CHAT_ID}
          parse_mode: Markdown
          message: |
            {{ range .Alerts }}
            {{ if eq .Status "firing" }}
            {{ if eq (index .Labels "severity") "critical" }}🔴{{ else }}⚠️{{ end }} *ArgusMonitor — {{ .Annotations.summary }}*
            {{ .Annotations.description }}
            _{{ .StartsAt.Format "02/01/2006 15:04" }}_
            {{ else }}
            ✅ *RESOLVIDO — {{ .Annotations.summary }}*
            {{ end }}
            {{ end }}
        disableResolveMessage: false
