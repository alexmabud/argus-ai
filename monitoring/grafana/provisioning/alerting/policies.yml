apiVersion: 1

# Períodos de silêncio — avisos não incomodam fora do horário operacional
muteTimes:
  - orgId: 1
    name: horario-noturno
    time_intervals:
      - times:
          # 22h às 7h (horário de Brasília = UTC-3, então 01:00–10:00 UTC)
          - start_time: "01:00"
            end_time: "10:00"

policies:
  - orgId: 1
    receiver: Telegram
    group_by: [alertname, severity]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Crítico: repete a cada 1h, SEM silêncio noturno (acorda se necessário)
      - receiver: Telegram
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h

      # Aviso: silencioso entre 22h e 7h BRT, repete a cada 4h durante o dia
      - receiver: Telegram
        matchers:
          - severity = warning
        mute_time_intervals:
          - horario-noturno
        repeat_interval: 4h
