# Observabilidade — Prometheus + Grafana + Exporters + Reporter Telegram
# Uso em produção:
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
# Uso local:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d

services:

  # ─── Prometheus: coleta e armazena métricas ─────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: always
    container_name: argus-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d        # 90 dias de histórico
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - argus-network

  # ─── Grafana: dashboards e alertas ──────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    restart: always
    container_name: argus-grafana
    # Entrypoint custom: render-provisioning.sh expande templates .tpl
    # (substitui ${TELEGRAM_*}) antes de chamar /run.sh do Grafana.
    # Workaround para bug do Grafana 10.x que perde tipagem string ao
    # expandir ${VAR} no YAML quando valor é numérico (ex.: chatid -123...).
    entrypoint: ["/bin/sh", "/render-provisioning.sh"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD obrigatório}
      GF_SERVER_ROOT_URL: https://${DOMAIN:-arguseye.duckdns.org}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Aponta provisioning para destino do render (writable pelo grafana)
      GF_PATHS_PROVISIONING: /var/lib/grafana/provisioning
      # Consumidas pelo render-provisioning.sh
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning-src:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/render-provisioning.sh:/render-provisioning.sh:ro
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - argus-network

  # ─── node_exporter: métricas da VM (CPU, RAM, Disco, Rede) ──────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    restart: always
    container_name: argus-node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    expose:
      - "9100"
    networks:
      - argus-network

  # ─── cAdvisor: métricas de cada container Docker ────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1   # suporte oficial ARM64 ✅
    restart: always
    container_name: argus-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    # ⚠️  INCOMPATIBILIDADE conhecida: Docker 29.x introduziu o storage driver
    # "overlayfs" (novo, não confundir com "overlay2") e removeu a estrutura
    # /var/lib/docker/image/overlayfs/layerdb/mounts/ que cAdvisor procura
    # para enriquecer séries com labels (name, image, container). Resultado:
    # target fica UP mas todas as séries container_* saem sem label "name",
    # tornando inúteis painéis "por container". Testado v0.49.1 → v0.52.1.
    # TODO: revisitar quando cAdvisor v0.53+ ou alternativa sair. Por ora,
    # mantido rodando (não custa) — usar node-exporter para métricas do host.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    expose:
      - "8080"
    networks:
      - argus-network

  # ─── postgres_exporter: métricas do PostgreSQL ──────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: always
    container_name: argus-postgres-exporter
    environment:
      DATA_SOURCE_NAME: >-
        postgresql://${DB_USER:-argus}:${DB_PASSWORD}@db:5432/${DB_NAME:-argus_db}?sslmode=disable
    expose:
      - "9187"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - argus-network

  # ─── redis_exporter: métricas do Redis ──────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    restart: always
    container_name: argus-redis-exporter
    environment:
      # Em produção o Redis exige senha. Se REDIS_PASSWORD não estiver no .env,
      # o compose falha com mensagem clara em vez de conectar sem auth e silenciar.
      REDIS_ADDR: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD obrigatório — verifique o .env}@redis:6379
    expose:
      - "9121"
    networks:
      - argus-network

  # ─── Reporter: relatório diário às 8h no Telegram ───────────────────
  telegram-reporter:
    build:
      context: ./monitoring/reporter
    restart: always
    container_name: argus-telegram-reporter
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN obrigatório}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:?TELEGRAM_CHAT_ID obrigatório}
      PROMETHEUS_URL: http://prometheus:9090
      DOMAIN: ${DOMAIN:-arguseye.duckdns.org}
    depends_on:
      - prometheus
    networks:
      - argus-network

volumes:
  # Volumes mapeados para /mnt/banco — consistente com postgres/redis/backups,
  # evita consumir disco do sistema (que pode ser pequeno na Oracle Cloud).
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/banco/prometheus

  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/banco/grafana

networks:
  argus-network:
    # ⚠️  NÃO usar external: true — a rede é definida no docker-compose.prod.yml (Task 7b).
    # Quando os dois composes sobem juntos com -p argus_ai, o Docker cria/reutiliza
    # argus_ai_argus-network automaticamente e todos os serviços se enxergam.
    driver: bridge
