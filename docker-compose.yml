services:
  # ═══════════════════════════════════════════════════════════════════════
  # Database: PostgreSQL com pgvector, PostGIS, pg_trgm
  # ═══════════════════════════════════════════════════════════════════════
  db:
    build:
      context: .
      dockerfile: docker/db.Dockerfile
    container_name: argus-db
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_dev
      POSTGRES_DB: argus_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_extensions.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - argus-network

  # ═══════════════════════════════════════════════════════════════════════
  # Cache: Redis para cache e fila de tarefas (arq)
  # ═══════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: argus-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - argus-network

  # ═══════════════════════════════════════════════════════════════════════
  # Storage: MinIO (S3-compatible) para uploads (imagens, PDFs, etc)
  # ═══════════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: argus-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio_data:/data
    networks:
      - argus-network

  # ═══════════════════════════════════════════════════════════════════════
  # MinIO: Inicializa bucket "argus" no startup
  # ═══════════════════════════════════════════════════════════════════════
  minio-init:
    image: minio/mc:latest
    container_name: argus-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/argus &&
      mc anonymous set download local/argus &&
      echo 'Bucket argus criado com sucesso.'
      "
    networks:
      - argus-network

  # ═══════════════════════════════════════════════════════════════════════
  # FastAPI: Backend da aplicação
  # ═══════════════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: argus-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://argus:argus_dev@db:5432/argus_db
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - argus-network

  # ═══════════════════════════════════════════════════════════════════════
  # Worker: arq worker para tarefas assíncronas
  # (PDF parsing, embeddings, face recognition, etc)
  # ═══════════════════════════════════════════════════════════════════════
  worker:
    build: .
    container_name: argus-worker
    command: arq app.worker.WorkerSettings
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://argus:argus_dev@db:5432/argus_db
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
    volumes:
      - .:/app
      - insightface_models:/root/.insightface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - argus-network

# ═════════════════════════════════════════════════════════════════════════
# Volumes persistentes
# ═════════════════════════════════════════════════════════════════════════
volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  insightface_models:
    driver: local

# ═════════════════════════════════════════════════════════════════════════
# Network para comunicação entre serviços
# ═════════════════════════════════════════════════════════════════════════
networks:
  argus-network:
    driver: bridge
