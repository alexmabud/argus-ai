# ══════════════════════════════════════════════════════════════
# Argus AI — Security Pipeline
# ══════════════════════════════════════════════════════════════
# Checks de segurança: secrets expostos, deps vulneráveis, SAST.
# Roda em PRs, push na main e semanalmente (segunda 9h UTC).
# Jobs independentes rodam em paralelo para feedback rápido.
# ══════════════════════════════════════════════════════════════

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

defaults:
  run:
    shell: bash

# ══════════════════════════════════════════════════════════════
jobs:

  # ── Secrets Leak Detection ─────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for .env files tracked
        run: |
          tracked="$(git ls-files '.env*' ':!.env.example' ':!.env.production.example')"
          if [ -n "$tracked" ]; then
            echo "::error::Arquivo .env encontrado no repositório!"
            echo "$tracked"
            exit 1
          fi
          echo "Nenhum .env rastreado pelo git"

      - name: TruffleHog secrets detection
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: --only-verified

  # ── Dependency Audit ───────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-deps: none

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Audit pinned lock file (if present)
        if: hashFiles('requirements.lock') != ''
        continue-on-error: true
        run: pip-audit -r requirements.lock --desc

      - name: Generate requirements from pyproject.toml
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project = data.get("project", {})
          deps = list(project.get("dependencies", []))
          deps.extend(project.get("optional-dependencies", {}).get("dev", []))

          output = Path("requirements-audit.txt")
          output.write_text("\n".join(deps) + "\n", encoding="utf-8")
          print(f"Gerado {output} com {len(deps)} dependências")
          PY

      - name: Audit dependencies for vulnerabilities
        continue-on-error: true
        run: |
          pip-audit \
            -r requirements-audit.txt \
            --desc \
            --format=json \
            --output=pip-audit-report.json

      - name: Print audit summary
        if: always()
        run: |
          if [ -f pip-audit-report.json ]; then
            python3 <<'PYEOF'
          import json, sys
          try:
              data = json.load(open("pip-audit-report.json"))
              vulns = [d for d in data.get("dependencies", []) if d.get("vulns")]
              if vulns:
                  print(f"::warning::{len(vulns)} dependência(s) com vulnerabilidades")
                  for d in vulns[:5]:
                      for v in d["vulns"]:
                          print(f"  - {d['name']} {d['version']}: {v['id']}")
              else:
                  print("Nenhuma vulnerabilidade encontrada")
          except Exception as e:
              print(f"::warning::Erro ao ler relatório: {e}", file=sys.stderr)
          PYEOF
          else
            echo "Relatório pip-audit não encontrado"
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: |
            pip-audit-report.json
            requirements-audit.txt
          if-no-files-found: ignore
          retention-days: 14

  # ── Claude AI Security Review (PR only, opt-in via secret) ─
  # Analisa o diff da PR com Claude (semantica + contexto) e
  # comenta vulnerabilidades direto na PR. Roda apenas em
  # pull_request. Se CLAUDE_API_KEY nao estiver configurado,
  # o job termina verde com aviso (nao polui aba Checks).
  # Para ativar: gh secret set CLAUDE_API_KEY
  claude-review:
    name: Claude AI Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check if CLAUDE_API_KEY is configured
        id: check-key
        env:
          KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::notice::CLAUDE_API_KEY nao configurado — pulando review AI. Para ativar: gh secret set CLAUDE_API_KEY"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        if: steps.check-key.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Claude Code Security Review
        if: steps.check-key.outputs.enabled == 'true'
        uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda # main @ 2026-05-26
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          exclude-directories: "frontend/node_modules,tests/fixtures,data,monitoring/grafana"

  # ── Static Analysis (SAST) ─────────────────────────────────
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-deps: none

      - name: Install Bandit
        run: python -m pip install bandit

      - name: Run Bandit SAST scan
        continue-on-error: true
        run: |
          bandit \
            -r app/ \
            -ll \
            -f json \
            -o bandit-report.json

      - name: Print Bandit summary
        if: always()
        run: |
          if [ -f bandit-report.json ]; then
            python3 <<'PYEOF'
          import json, sys
          try:
              data = json.load(open("bandit-report.json"))
              results = data.get("results", [])
              if results:
                  high = [r for r in results if r.get("issue_severity") == "HIGH"]
                  med = [r for r in results if r.get("issue_severity") == "MEDIUM"]
                  print(f"::warning::Bandit: {len(high)} HIGH, {len(med)} MEDIUM, {len(results)} total")
                  for r in high[:5]:
                      print(f"  - {r['filename']}:{r['line_number']} {r['issue_text']}")
              else:
                  print("Bandit: nenhum issue encontrado")
          except Exception as e:
              print(f"::warning::Erro ao ler relatório: {e}", file=sys.stderr)
          PYEOF
          else
            echo "Relatório Bandit não encontrado"
          fi

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: bandit-report.json
          if-no-files-found: ignore
          retention-days: 14
