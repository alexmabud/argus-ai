# ══════════════════════════════════════════════════════════════
# Argus AI — Security Pipeline
# ══════════════════════════════════════════════════════════════
# Checks de segurança: secrets expostos, deps vulneráveis, SAST.
# Roda em PRs, push na main e semanalmente (segunda 9h UTC).
# Jobs independentes rodam em paralelo para feedback rápido.
# ══════════════════════════════════════════════════════════════

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  # requirements.lock é gerado/travado sob 3.12 (PYTHON_VERSION_LOCK em
  # ci.yml) — o job dependency-audit precisa instalar exatamente esse lock
  # pra auditar de verdade, então precisa da MESMA versão de Python. Bug de
  # CI encontrado por revisão de segurança: dependency-audit rodava sob 3.11
  # (PYTHON_VERSION geral, usado por jobs que não instalam o lock, como
  # sast) e falhava ao instalar pacotes com piso >=3.12 (ex.: tifffile).
  PYTHON_VERSION_LOCK: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

defaults:
  run:
    shell: bash

# ══════════════════════════════════════════════════════════════
jobs:

  # ── Secrets Leak Detection ─────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for .env files tracked
        run: |
          tracked="$(git ls-files '.env*' ':!.env.example' ':!.env.production.example')"
          if [ -n "$tracked" ]; then
            echo "::error::Arquivo .env encontrado no repositório!"
            echo "$tracked"
            exit 1
          fi
          echo "Nenhum .env rastreado pelo git"

      - name: TruffleHog secrets detection
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --only-verified

  # ── Dependency Audit ───────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION_LOCK }}
          install-deps: none

      - name: Install pip-audit
        run: python -m pip install pip-audit packaging

      - name: Check requirements.lock satisfies pyproject.toml floors
        # achado #20/2026-07-13: um piso elevado em pyproject.toml (bump manual
        # ou merge de PR do Dependabot) sem regenerar requirements.lock
        # (`make lock`) passava batido — o build de produção continuava
        # instalando a versão antiga, abaixo do piso declarado, sem que
        # nenhum lint/teste acusasse. Não é diff bruto do lock inteiro: como
        # pyproject usa ">=" sem teto, pip-compile resolve versões mais novas
        # com o tempo mesmo sem mudança nenhuma — isso é esperado, não é
        # drift real. Só falha quando o lock fica ABAIXO do piso declarado.
        run: python scripts/check_lock_drift.py

      - name: Audit pinned lock file (bloqueante — igual ao que vai pra produção)
        if: hashFiles('requirements.lock') != ''
        # achado #20/2026-07-13: pip-audit rodava com continue-on-error,
        # então uma CVE nova em requirements.lock nunca derrubava o CI.
        # --ignore-vuln documenta vulnerabilidades JÁ conhecidas para não travar
        # todo PR por um problema pré-existente não introduzido por ele —
        # qualquer CVE NOVA (não listada abaixo) ainda derruba o job.
        # Achado #32/2026-07-13: starlette (PYSEC-2026-161/248/249/2280/2281)
        # corrigido via bump de prometheus-fastapi-instrumentator p/ >=8.0
        # (forçou starlette >=1.0, removendo o cap <0.137 do fastapi — verificado
        # manualmente que 0.139.0+starlette 1.3.1+instrumentator 8.0.2 funcionam
        # juntos). aiohttp/python-multipart/torch seguem pendentes — upgrade
        # requer avaliação própria (breaking changes maiores esperados).
        # PYSEC-2026-3447 (setuptools 81.0.0, corrigido em 83.0.0): torch==2.12.0
        # exige setuptools<82 — não dá pra atualizar sem bump de torch (fora de
        # escopo, mesmo motivo do aiohttp/python-multipart acima). A CVE é sobre
        # bypass de exclusão de MANIFEST.in via normalização Unicode ao montar
        # sdist em filesystem macOS (APFS/HFS+) — não se aplica aqui: deploy é
        # Linux/Docker, e o pipeline consome wheels pré-buildadas via
        # requirements.lock, nunca constrói sdist a partir de árvore não confiável.
        run: |
          pip-audit -r requirements.lock --desc \
            --ignore-vuln PYSEC-2026-237 \
            --ignore-vuln PYSEC-2026-2104 \
            --ignore-vuln PYSEC-2026-2105 \
            --ignore-vuln PYSEC-2026-2106 \
            --ignore-vuln PYSEC-2026-2107 \
            --ignore-vuln PYSEC-2026-2108 \
            --ignore-vuln PYSEC-2026-2109 \
            --ignore-vuln PYSEC-2026-2110 \
            --ignore-vuln PYSEC-2026-2111 \
            --ignore-vuln PYSEC-2026-2112 \
            --ignore-vuln PYSEC-2026-2113 \
            --ignore-vuln PYSEC-2026-3036 \
            --ignore-vuln PYSEC-2026-3037 \
            --ignore-vuln PYSEC-2026-3040 \
            --ignore-vuln PYSEC-2026-3447 \
            --ignore-vuln CVE-2025-3000

      - name: Generate requirements from pyproject.toml
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project = data.get("project", {})
          deps = list(project.get("dependencies", []))
          deps.extend(project.get("optional-dependencies", {}).get("dev", []))

          output = Path("requirements-audit.txt")
          output.write_text("\n".join(deps) + "\n", encoding="utf-8")
          print(f"Gerado {output} com {len(deps)} dependências")
          PY

      - name: Audit dependencies for vulnerabilities
        continue-on-error: true
        run: |
          pip-audit \
            -r requirements-audit.txt \
            --desc \
            --format=json \
            --output=pip-audit-report.json

      - name: Print audit summary
        if: always()
        run: |
          if [ -f pip-audit-report.json ]; then
            python3 <<'PYEOF'
          import json, sys
          try:
              data = json.load(open("pip-audit-report.json"))
              vulns = [d for d in data.get("dependencies", []) if d.get("vulns")]
              if vulns:
                  print(f"::warning::{len(vulns)} dependência(s) com vulnerabilidades")
                  for d in vulns[:5]:
                      for v in d["vulns"]:
                          print(f"  - {d['name']} {d['version']}: {v['id']}")
              else:
                  print("Nenhuma vulnerabilidade encontrada")
          except Exception as e:
              print(f"::warning::Erro ao ler relatório: {e}", file=sys.stderr)
          PYEOF
          else
            echo "Relatório pip-audit não encontrado"
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: |
            pip-audit-report.json
            requirements-audit.txt
          if-no-files-found: ignore
          retention-days: 14

  # ── Static Analysis (SAST) ─────────────────────────────────
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-deps: none

      - name: Install Bandit
        run: python -m pip install bandit

      - name: Run Bandit SAST scan
        continue-on-error: true
        run: |
          bandit \
            -r app/ \
            -ll \
            -f json \
            -o bandit-report.json

      - name: Print Bandit summary
        if: always()
        run: |
          if [ -f bandit-report.json ]; then
            python3 <<'PYEOF'
          import json, sys
          try:
              data = json.load(open("bandit-report.json"))
              results = data.get("results", [])
              if results:
                  high = [r for r in results if r.get("issue_severity") == "HIGH"]
                  med = [r for r in results if r.get("issue_severity") == "MEDIUM"]
                  print(f"::warning::Bandit: {len(high)} HIGH, {len(med)} MEDIUM, {len(results)} total")
                  for r in high[:5]:
                      print(f"  - {r['filename']}:{r['line_number']} {r['issue_text']}")
              else:
                  print("Bandit: nenhum issue encontrado")
          except Exception as e:
              print(f"::warning::Erro ao ler relatório: {e}", file=sys.stderr)
          PYEOF
          else
            echo "Relatório Bandit não encontrado"
          fi

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: bandit-report.json
          if-no-files-found: ignore
          retention-days: 14
