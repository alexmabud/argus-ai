# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ══════════════════════════════════════════════════════════════
# Argus AI — Deploy Pipeline
# ══════════════════════════════════════════════════════════════
# Deploy automático na VM quando CI passa na main.
# Também pode ser disparado manualmente via workflow_dispatch.
# Conecta via SSH e executa docker compose up --build.
#
# Secrets necessários no GitHub:
#   VM_SSH_HOST        — IP ou hostname da VM
#   VM_SSH_USER        — Usuário SSH (ex: root, ubuntu)
#   VM_SSH_KEY         — Chave privada SSH (conteúdo completo)
#   GF_ADMIN_PASSWORD  — Senha do admin do Grafana (monitoring stack)
#   TELEGRAM_BOT_TOKEN — Token do bot Telegram (monitoring stack)
#   TELEGRAM_CHAT_ID   — ID do chat de alertas (monitoring stack)
# Os 3 últimos são necessários porque este deploy também sobe a monitoring
# stack (docker-compose.monitoring.yml exige essas variáveis). Passamos como
# env de sessão SSH, sem persistir no .env da VM (ver Task 25).
# ══════════════════════════════════════════════════════════════

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

defaults:
  run:
    shell: bash

# ══════════════════════════════════════════════════════════════
jobs:

  # achado #20/2026-07-13: o deploy só esperava o workflow CI (workflow_run:
  # [CI]) terminar — o workflow Security roda em paralelo mas nunca bloqueava
  # o deploy, mesmo com secret vazado (TruffleHog) ou dependência com CVE
  # bloqueante (pip-audit). Este job consulta a run mais recente e concluída
  # do Security para o MESMO commit sendo deployado antes de liberar o deploy.
  check-security-gate:
    name: Verify Security workflow passed
    runs-on: ubuntu-latest
    # 7min, não 5 (revisão pós-#20/2026-07-13): o polling abaixo já consome até
    # 5min só de sleep (10x30s) + latência de cada chamada `gh api` — com
    # timeout-minutes: 5 o runner podia matar o job no meio de um `sleep 30`
    # antes do script reportar seu próprio erro "não concluiu a tempo",
    # aparecendo como "cancelled" em vez de uma falha diagnosticável.
    timeout-minutes: 7
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolver commit sendo deployado
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Exigir sucesso do Security para este commit
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.resolve.outputs.sha }}
        # CI e Security rodam em paralelo — nao ha garantia de que o Security
        # ja tenha concluido no instante em que este workflow_run (CI) dispara
        # o deploy. Faz polling (10 tentativas, 30s de intervalo = ate 5min)
        # em vez de checar uma unica vez: distingue "ainda rodando" (espera)
        # de "rodou e falhou" (bloqueia na hora, sem esperar o timeout todo).
        run: |
          echo "Verificando runs do workflow Security para o commit $SHA..."
          for i in $(seq 1 10); do
            conclusion="$(gh api "repos/${{ github.repository }}/actions/workflows/security.yml/runs?head_sha=${SHA}&status=completed&per_page=1" \
              --jq '.workflow_runs[0].conclusion // "missing"')"
            echo "Tentativa $i/10 — conclusão mais recente do Security: $conclusion"
            if [ "$conclusion" = "success" ]; then
              exit 0
            fi
            if [ "$conclusion" != "missing" ]; then
              echo "::error::Workflow Security concluiu com falha (conclusão: $conclusion) para o commit $SHA — deploy bloqueado."
              exit 1
            fi
            sleep 30
          done
          echo "::error::Workflow Security não concluiu a tempo (nenhuma run completa em 5min) para o commit $SHA — deploy bloqueado."
          exit 1

  deploy:
    name: Deploy to VM
    needs: check-security-gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    if: needs.check-security-gate.result == 'success'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 30m
          envs: GF_ADMIN_PASSWORD,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -e
            cd ~/argus-ai
            echo "══════ Parando todos os containers ══════"
            # Usa ambos os arquivos para não tratar monitoring como "órfão"
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
              down 2>/dev/null || true

            echo "══════ Limpando espaço (mantém imagens base) ══════"
            # -a removeria todas as imagens → Docker Hub rate limit a cada deploy
            # Sem -a: remove apenas imagens dangling + containers parados
            docker system prune -f
            # Cache de build acumula GBs por deploy; mantém últimos 7 dias para
            # acelerar rebuilds da semana e descarta o resto.
            docker builder prune -af --filter "until=168h"

            echo "══════ Atualizando código ══════"
            git fetch origin main
            git reset --hard origin/main

            echo "══════ Higienizando CORS_ORIGINS (idempotente) ══════"
            bash ./scripts/fix_prod_cors.sh .env

            echo "══════ Versionando Service Worker e cache-bust do index.html ══════"
            bash ./update_sw_version.sh
            trap 'git checkout frontend/sw.js frontend/index.html 2>/dev/null || true' EXIT

            echo "══════ Build e deploy da app ══════"
            docker compose -f docker-compose.prod.yml rm -f minio-init || true
            docker compose -f docker-compose.prod.yml up -d --build

            echo "══════ Rodando migrations (como DONO via MIGRATION_DATABASE_URL) ══════"
            sleep 5
            # alembic/env.py usa settings.effective_migration_url (dono argus),
            # não a DATABASE_URL de runtime (argus_app só-DML).
            docker compose -f docker-compose.prod.yml exec -T api python -m alembic upgrade head

            echo "══════ Aguardando health check ══════"
            sleep 10
            if curl -sf http://localhost:80/health > /dev/null; then
              echo "App deployada com sucesso!"
            else
              echo "::warning::Health check falhou — verificar logs"
              docker compose -f docker-compose.prod.yml logs --tail=20 api
              exit 1
            fi

            echo "══════ Reiniciando monitoring stack ══════"
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
              up -d --build \
              prometheus grafana node-exporter \
              postgres-exporter redis-exporter telegram-reporter \
              blackbox-exporter
            sleep 8
            echo "══════ Status do monitoring stack ══════"
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
              ps prometheus grafana node-exporter \
              postgres-exporter redis-exporter telegram-reporter
        env:
          GF_ADMIN_PASSWORD: ${{ secrets.GF_ADMIN_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
