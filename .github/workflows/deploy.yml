# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ══════════════════════════════════════════════════════════════
# Argus AI — Deploy Pipeline
# ══════════════════════════════════════════════════════════════
# Deploy automático na VM quando CI passa na main.
# Também pode ser disparado manualmente via workflow_dispatch.
# Conecta via SSH e executa docker compose up --build.
#
# Secrets necessários no GitHub:
#   VM_SSH_HOST — IP ou hostname da VM
#   VM_SSH_USER — Usuário SSH (ex: root, ubuntu)
#   VM_SSH_KEY  — Chave privada SSH (conteúdo completo)
# ══════════════════════════════════════════════════════════════

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

defaults:
  run:
    shell: bash

# ══════════════════════════════════════════════════════════════
jobs:

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd ~/argus-ai
            echo "══════ Parando todos os containers ══════"
            # Usa ambos os arquivos para não tratar monitoring como "órfão"
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
              down 2>/dev/null || true

            echo "══════ Limpando espaço (mantém imagens base) ══════"
            # -a removeria todas as imagens → Docker Hub rate limit a cada deploy
            # Sem -a: remove apenas imagens dangling + containers parados
            docker system prune -f
            # Cache de build acumula GBs por deploy; mantém últimos 7 dias para
            # acelerar rebuilds da semana e descarta o resto.
            docker builder prune -af --filter "until=168h"

            echo "══════ Atualizando código ══════"
            git pull

            echo "══════ Higienizando CORS_ORIGINS (idempotente) ══════"
            bash ./scripts/fix_prod_cors.sh .env

            echo "══════ Versionando Service Worker e cache-bust do index.html ══════"
            bash ./update_sw_version.sh
            trap 'git checkout frontend/sw.js frontend/index.html 2>/dev/null || true' EXIT

            echo "══════ Build e deploy da app ══════"
            docker compose -f docker-compose.prod.yml rm -f minio-init || true
            docker compose -f docker-compose.prod.yml up -d --build

            echo "══════ Rodando migrations ══════"
            sleep 5
            docker compose -f docker-compose.prod.yml exec -T api python -m alembic upgrade head

            echo "══════ Aguardando health check ══════"
            sleep 10
            if curl -sf http://localhost:80/health > /dev/null; then
              echo "App deployada com sucesso!"
            else
              echo "::warning::Health check falhou — verificar logs"
              docker compose -f docker-compose.prod.yml logs --tail=20 api
              exit 1
            fi

            echo "══════ Reiniciando monitoring stack ══════"
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
              up -d --build \
              prometheus grafana node-exporter cadvisor \
              postgres-exporter redis-exporter telegram-reporter \
              blackbox-exporter
            sleep 8
            echo "══════ Status do monitoring stack ══════"
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
              ps prometheus grafana node-exporter cadvisor \
              postgres-exporter redis-exporter telegram-reporter
