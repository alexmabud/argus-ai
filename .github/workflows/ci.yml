# ══════════════════════════════════════════════════════════════
# Argus AI — CI Pipeline
# ══════════════════════════════════════════════════════════════
# Lint (ruff + mypy) e testes (pytest) em paralelo.
# Roda em PRs e push na main. Testes usam PostgreSQL 16 com
# pgvector + PostGIS e Redis como service containers.
# ══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

defaults:
  run:
    shell: bash

# ══════════════════════════════════════════════════════════════
jobs:

  # ── Lint ──────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-deps: lint

      - name: Install mypy with pydantic plugin
        run: python -m pip install mypy pydantic

      - name: Ruff check
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Mypy type check
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports

  # ── Tests ─────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: argus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/argus_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key-for-ci
      ENCRYPTION_KEY: Eas3Nq_BCCCbr_ok5M2YX84TuOdNZA_hukLRXUr4nxQ=
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: argus-test
      TESTING: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          timeout 30 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done'
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc:latest mb local/argus-test --ignore-existing

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-deps: dev

      - name: Install additional test dependencies
        run: python -m pip install aioboto3

      - name: Install PostGIS in database container
        run: |
          docker exec $(docker ps -q --filter "ancestor=pgvector/pgvector:pg16") bash -c "
            apt-get update -qq &&
            apt-get install -y --no-install-recommends postgresql-16-postgis-3 postgresql-16-postgis-3-scripts
          "

      - name: Enable database extensions
        run: |
          PGPASSWORD=test psql -h localhost -U test -d argus_test <<'SQL'
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
          SQL

      - name: Run tests
        run: pytest -v --cov=app --cov-report=term-missing --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
          retention-days: 7
