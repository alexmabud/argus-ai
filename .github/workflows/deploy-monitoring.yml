# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ══════════════════════════════════════════════════════════════
# Argus AI — Deploy Monitoring Stack
# ══════════════════════════════════════════════════════════════
# Sobe Prometheus + Grafana + Exporters + Telegram Reporter.
# Disparado manualmente via workflow_dispatch.
#
# Secrets necessários:
#   VM_SSH_HOST         — IP da VM
#   VM_SSH_USER         — Usuário SSH (ubuntu)
#   VM_SSH_KEY          — Chave privada SSH
#   GF_ADMIN_PASSWORD   — Senha do admin do Grafana
#   TELEGRAM_BOT_TOKEN  — Token do bot Telegram (@BotFather)
#   TELEGRAM_CHAT_ID    — ID do grupo/chat que recebe alertas
# ══════════════════════════════════════════════════════════════

name: Deploy Monitoring

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-monitoring
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:

  deploy-monitoring:
    name: Deploy monitoring stack to VM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Deploy monitoring via SSH
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 12m
          envs: GF_ADMIN_PASSWORD,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -e
            cd ~/argus-ai

            echo "══════ Atualizando código ══════"
            git fetch origin main
            git reset --hard origin/main

            echo "══════ Adicionando variáveis de monitoramento ao .env ══════"
            sed -i '/^GF_ADMIN_PASSWORD=/d; /^TELEGRAM_BOT_TOKEN=/d; /^TELEGRAM_CHAT_ID=/d' .env
            printf '\nGF_ADMIN_PASSWORD=%s\nTELEGRAM_BOT_TOKEN=%s\nTELEGRAM_CHAT_ID=%s\n' \
              "$GF_ADMIN_PASSWORD" "$TELEGRAM_BOT_TOKEN" "$TELEGRAM_CHAT_ID" >> .env

            echo "══════ Criando diretórios de dados ══════"
            sudo mkdir -p /mnt/banco/prometheus /mnt/banco/grafana
            # Limpa arquivos antigos com permissões erradas (safe: nenhum dado coletado ainda)
            sudo rm -rf /mnt/banco/prometheus/* /mnt/banco/grafana/*
            # Donos corretos para cada container e perms restritivas (Task 24):
            # Prometheus = UID 65534 (nobody), Grafana = UID 472. Antes era chmod 777,
            # gravando dado sensivel world-writable.
            sudo chown 65534:65534 /mnt/banco/prometheus
            sudo chown 472:472 /mnt/banco/grafana
            sudo chmod 750 /mnt/banco/prometheus /mnt/banco/grafana

            echo "══════ Subindo stack de monitoramento ══════"
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
              up -d --force-recreate --build \
              prometheus grafana node-exporter \
              postgres-exporter redis-exporter telegram-reporter

            echo "══════ Aguardando 40s p/ Grafana provisionar + estabilizar ══════"
            sleep 40
            echo "══════ Status containers ══════"
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
              ps \
              prometheus grafana node-exporter \
              postgres-exporter redis-exporter telegram-reporter

            echo "══════ Restart count (>0 indica crash-loop) ══════"
            for c in argus-prometheus argus-grafana argus-telegram-reporter; do
              echo -n "$c: restarts="
              docker inspect -f '{{.RestartCount}}' $c 2>/dev/null || echo "container não existe"
            done

            echo "══════ Logs Grafana (últimas 50) ══════"
            docker logs argus-grafana --tail 50 2>&1 || true
            echo "══════ Logs Prometheus (últimas 20) ══════"
            docker logs argus-prometheus --tail 20 2>&1 || true

            echo "✅ Monitoring stack deployed!"
        env:
          GF_ADMIN_PASSWORD: ${{ secrets.GF_ADMIN_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
